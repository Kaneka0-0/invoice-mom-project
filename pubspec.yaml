name: panha_invoice
description: Brick Factory Invoice Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # Storage
  shared_preferences: ^2.3.2

  # Cloud sync (Supabase)
  supabase_flutter: ^2.8.4

  # PDF generation
  pdf: ^3.11.1
  printing: ^5.13.1
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.0
  uuid: ^4.4.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
